<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Step Quiz">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#f8fafc">

    <meta name="description" content="Activitat interactiva — Lectura de gràfiques: temperatura i temps">
    <title>Recta Numèrica Doble</title>

    <!--
        PARÀMETRES URL:
          ?nivell=1              Distractors simples (errors obvis)
          ?nivell=2              Distractors mitjans (per defecte)
          ?nivell=3              Distractors elaborats (errors subtils)
          ?totalsessions=N       Nombre de sessions (per defecte: 1)
          ?totaloperations=N     Nombre de preguntes per sessió (per defecte: 6)
          ?maxintents=N          Intents màxims per pregunta (per defecte: 2)
          ?maxenllocmitjana=0|1  Nota: màxim sessió (1) o mitjana (0) (per defecte: 1)

        EXEMPLE:
          recta-numerica.html?nivell=2&totalsessions=5&totaloperations=8&maxintents=3
    -->

    <!-- Valors per defecte del joc (sobreescrits pels paràmetres URL via config.js) -->
    <script>
        window.APP_CONFIG = {
            defaultSessions:      1,
            defaultOperations:    6,
            defaultIntents:       2,
            defaultEnllocMitjana: 1
        };
    </script>
    <script src="js/fixed-sessions.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>

    <!-- Google Font: Barlow -->
    <link rel="stylesheet" href="vendor/fonts/fonts.css">

    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/recta-numerica.css?v=2">
<link rel="stylesheet" href="css/chromebook.css">
</head>
<body>

<!-- Capçalera amb títol -->
<div class="title-row">
    <a href="index.html" class="home-icon-link" title="Tornar a l'inici" aria-label="Tornar a l'inici">
        <img src="icon.png" alt="Inici" onerror="this.style.display='none'">
    </a>
    <h1>Lectura de Gràfiques</h1>
</div>

<!-- Panell principal -->
<div class="panel" id="main-panel">

    <!-- Pantalla de joc -->
    <div id="game-screen" style="display:none;">

        <!-- Capçalera del joc -->
        <div class="game-header">
            <div class="header-left">
                <span id="level-display"></span>
                <span id="q-display">Pregunta 1 de 6</span>
            </div>
            <span id="score-display">Punts: 0</span>
            <span id="attempts-display">Intents: 2</span>
        </div>

        <!-- Cos principal: columna esquerra + columna dreta -->
        <div class="game-body">

            <!-- Columna esquerra 30%: pregunta + opcions + feedback -->
            <div class="game-left">
                <div id="question-prompt"></div>
                <div id="options-container" class="options-grid"></div>
                <div id="feedback" class="feedback-area"></div>
            </div>

            <!-- Columna dreta 70%: gràfic SVG -->
            <div class="game-right">
                <div id="graph-container"></div>
            </div>

        </div>

        <!-- #mini-victory-overlay injectat aquí per game-core.js via injectSharedHTML() -->

    </div>

    <!-- #session-end-screen i #final-screen injectats per game-core.js via injectSharedHTML() -->

</div>

<!--
    ORDRE DE CÀRREGA:
    utils → config → game-core → cloud-engine → strings → distractor-lib → question-bank → recta-numerica (defer)
-->
<script src="vendor/native/native-bridge.js"></script>
<script src="js/game-core.js"></script>
<script src="js/recta-numerica/cloud-engine.js"></script>
<script src="js/recta-numerica/strings.js"></script>
<script src="js/recta-numerica/distractor-lib.js"></script>
<script src="js/recta-numerica/question-bank.js"></script>
<script defer src="js/recta-numerica/recta-numerica.js"></script>

</body>
</html>
