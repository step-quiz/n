  <style>
    :root {
      --text-main: #1e293b;
      --text-muted: #64748b;
      --bg-body: #f8fafc;
      --eso-bg: #eff6ff;
      --batx-bg: #f1f5f9;
      --math-title: #3486e4;
      --border-heavy: #cbd5e1;
      --panel-w: 384px;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; }

    html { overflow: hidden; }
    /* [FIX A2] Augmentat de 600px a 850px per cobrir tauletes landscape i Chromebooks */
    @media (max-height: 850px) { html { overflow: auto; } }
    body {
      margin: 0;
      background: var(--bg-body);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text-main);
      padding: 10px;
      padding-bottom: 75px;
      min-height: 100vh; min-height: 100dvh; /* [FIX BUG4] */
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .title-container { text-align: center; margin-bottom: 20px; }
    .title-row-1 { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 36px; font-weight: 800; color: #0f172a; margin: 0; }
    .title-row-2 { font-size: 24px; font-weight: 400; color: var(--math-title); margin-top: -15px; }
    .inline-icon { height: 82px; opacity: 0; animation: icon-slide-brake 0.9s cubic-bezier(0.1, 1.0, 0.2, 1.0) 0.1s forwards; }
    .text-step { opacity: 0; animation: fade-in 0.43s ease-out 0.6s forwards; }
    .title-row-2, #mobile-nav-container { opacity: 0; animation: fade-in 0.24s ease-out 1.50s forwards; }

    @keyframes icon-slide-brake { from { transform: translateX(-90px) scale(0.8); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .main-wrapper { display: flex; gap: 30px; justify-content: center; width: 100%; max-width: 1000px; align-items: stretch; }
    .quiz-panel { width: var(--panel-w); max-width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .sub-panel { padding: 15px 25px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid var(--border-heavy); display: flex; flex-direction: column; }
    #panel-eso  { opacity: 0; animation: fade-in 0.24s ease-out 1.50s forwards; }
    #panel-batx { opacity: 0; animation: fade-in 0.24s ease-out 1.80s forwards; }
    #panel-eso  .sub-panel { background-color: var(--eso-bg); }
    #panel-batx .sub-panel { background-color: var(--batx-bg); }

    h2 { margin: 0 0 10px 5px; font-size: 22px; font-weight: 800; }

    .row { display: grid; grid-template-columns: 100px 1fr; align-items: center; gap: 10px; padding: 4px 8px; }
    .row label { font-size: 14px; font-weight: 600; text-align: left; }

    /* Selects natius (sessions, preguntes, errors, criteri) — sense canvis */
    select {
      appearance: none; background-color: #ffffff; height: 32px; padding: 0 10px;
      font-size: 14px; border: 1px solid var(--border-heavy); border-radius: 6px;
      cursor: pointer; text-align: center; width: 100%; transition: background-color 0.2s;
    }
    select:hover { background-color: #cbd5e1; }

    /* ── CUSTOM DROPDOWN (Tailwind UI) ── */
    .cd-wrap { position: relative; width: 100%; font-size: 14px; user-select: none; }

    .cd-trigger {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      height: 32px; padding: 0 10px; background: #fff;
      border: 1px solid var(--border-heavy); border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-main);
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .cd-trigger:hover { border-color: #94a3b8; background: #e2e8f0; }
    .cd-wrap.open .cd-trigger { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); background: #fff; }

    .cd-chevron {
      flex-shrink: 0; width: 15px; height: 15px; color: var(--text-muted);
      transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    .cd-wrap.open .cd-chevron { transform: rotate(180deg); }

    .cd-list {
      position: absolute; top: calc(100% + 5px); left: 0; right: 0;
      background: #fff; border: 1px solid var(--border-heavy); border-radius: 10px;
      box-shadow: 0 8px 30px -4px rgba(15,23,42,0.12), 0 2px 8px -2px rgba(15,23,42,0.08);
      z-index: 999; overflow-y: auto; max-height: 260px; padding: 4px;
      transform-origin: top center;
      transform: scaleY(0.92) translateY(-4px); opacity: 0; pointer-events: none;
      transition: transform 0.18s cubic-bezier(0.4,0,0.2,1), opacity 0.18s cubic-bezier(0.4,0,0.2,1);
    }
    .cd-wrap.open .cd-list { transform: scaleY(1) translateY(0); opacity: 1; pointer-events: auto; }

    .cd-option {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 6px; cursor: pointer;
      font-size: 14px; color: var(--text-main); transition: background 0.1s;
    }
    .cd-option:hover { background: #eff6ff; }
    .cd-option.selected { font-weight: 600; color: var(--accent); background: #eff6ff; }
    .cd-check { width: 13px; height: 13px; flex-shrink: 0; color: var(--accent); opacity: 0; }
    .cd-option.selected .cd-check { opacity: 1; }
    .cd-separator { height: 1px; background: #94a3b8; margin: 4px 6px; }

    /* Link block */
    .link-block { margin-top: 8px; padding-inline: 5px; }
    .panel-spacer { display: none; }

    @media (max-width: 1050px) {
      .panel-spacer { display: block; flex: 1; max-height: 40px; }
    }
    .link-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; margin-bottom: 4px; display: block; }
    .link-output { width: 100%; min-height: 45px; height: 45px; font-family: monospace; font-size: 11px; padding: 8px; border-radius: 6px; border: 1px solid var(--border-heavy); background: #e2e8f0; word-break: break-all; user-select: all; -webkit-user-select: all; cursor: text; line-height: 1.3; display: flex; align-items: center; }

    .btn-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
    .copy-btn, .open-btn, .help-btn { height: 38px; cursor: pointer; border-radius: 6px; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; border: none; gap: 6px; transition: all 0.2s ease; }
    .copy-btn { flex: 0.8; background: #ffffff; color: var(--text-main); border: 1px solid var(--border-heavy); }
    .help-btn { flex: 0.9; background: #ffffff; color: var(--text-main); border: 1px solid var(--border-heavy); }
    .open-btn { flex: 1.25; background: var(--accent); color: white; }
    .copy-btn:hover, .help-btn:hover { background-color: #cbd5e1; border-color: #94a3b8; }
    .open-btn:hover { background: #1d4ed8; }
    .copy-status { font-size: 13px; color: #059669; margin-top: 0px; min-height: 0px; font-weight: 700; text-align: center; }

    /* Mòbil */
    .mobile-nav { display: none; margin-bottom: 20px; padding: 5px; background: #e2e8f0; border-radius: 12px; width: 100%; max-width: var(--panel-w); }
    .mobile-nav input { display: none; }
    .mobile-nav label { flex: 1; text-align: center; padding: 10px 0; font-weight: 700; cursor: pointer; border-radius: 8px; color: var(--text-muted); }
    .mobile-nav label:hover { background-color: #cbd5e1; }
    .mobile-nav input:checked + label { background: #ffffff; color: var(--text-main); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    @media (max-width: 1050px) {
      html { overflow: auto; }
      body { justify-content: flex-start; padding-top: 15px; min-height: 100dvh; }
      .main-wrapper { flex-direction: column; align-items: center; flex: 0 0 auto; align-self: center; width: 100%; }
      .mobile-nav { display: flex; }
      .quiz-panel { display: none; }
      .quiz-panel.active { display: flex; flex: 0 0 auto; animation: fade-in 0.3s ease-out forwards; animation-delay: 0s !important; justify-content: flex-start; }
    }

    @media (max-width: 480px) {
      body { padding-bottom: 100px; padding-top: 10px !important; }
      .bottom-icon { bottom: 88px !important; }
      .copy-btn, .open-btn, .help-btn { font-size: 12px; }
      .title-container { margin-bottom: 10px; }
      .inline-icon { height: 60px; }
      .title-row-1 { font-size: 28px; }
      .title-row-2 { font-size: 18px; margin-top: -10px; }
    }

    .select-atencio-shake { animation: select-shake-wave 1.2s ease-in-out; }
    @keyframes select-shake-wave {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); background-color: #fef08a; }
      20%, 40%, 60%, 80% { transform: translateX(4px); background-color: #ffedd5; }
    }

    .help-btn { display: none; }

    /* ── Animació derrapada sabatilla ── */
    .icon-wrap {
      position: relative;
      display: inline-flex;
      align-items: flex-end;
    }

    /* Línies de derrapada: apareixen mentre frena, es dissolen */
    .icon-wrap::before {
      content: '';
      position: absolute;
      bottom: 11px;
      left: 4px;
      width: 32px;
      height: 6px;
      opacity: 0;
      background:
        linear-gradient(to right, #b8c4d0, #b8c4d0) left top    / 26px 2px no-repeat,
        linear-gradient(to right, #cbd5e1, #cbd5e1) left bottom / 32px 2px no-repeat;
      border-radius: 1px;
      animation: skid 0.55s cubic-bezier(0.15, 0, 0.6, 1) 0.20s forwards;
    }

    /* Núvol de pols: apareix just quan s'atura i es dissipa */
    .icon-wrap::after {
      content: '';
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      opacity: 0;
      box-shadow:
        -10px  0px 5px 4px rgba(148,163,184,0.35),
        -18px -3px 4px 3px rgba(148,163,184,0.20),
         -6px -6px 3px 2px rgba(148,163,184,0.15);
      animation: dust 0.9s ease-out 0.48s forwards;
    }

    @keyframes skid {
      0%   { clip-path: inset(0 100% 0 0); opacity: 0; }
      25%  { clip-path: inset(0 10%  0 0); opacity: 0.75; }
      100% { clip-path: inset(0 0%   0 0); opacity: 0; }
    }

    @keyframes dust {
      0%   { opacity: 0;   transform: scale(0.4) translateX(0); }
      15%  { opacity: 0.9; }
      100% { opacity: 0;   transform: scale(2.0) translateX(-10px); }
    }
  </style>

  <script>
    // ── Custom dropdown factory ──
    function makeCustomDropdown(wrapId, activities, defaultFile, onChangeCallback) {
      const wrap    = document.getElementById(wrapId);
      const trigger = wrap.querySelector('.cd-trigger');
      const list    = wrap.querySelector('.cd-list');
      const label   = wrap.querySelector('.cd-label');
      let currentFile = defaultFile;

      function getValue() { return currentFile; }

      function render() {
        list.innerHTML = '';
        activities.forEach(a => {
          if (a.separator) {
            const hr = document.createElement('div');
            hr.className = 'cd-separator';
            list.appendChild(hr);
            return;
          }
          const div = document.createElement('div');
          div.className = 'cd-option' + (a.file === currentFile ? ' selected' : '');
          div.innerHTML = `
            <svg class="cd-check" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 8 7 12 13 4"/>
            </svg>
            <span>${a.label}</span>`;
          div.addEventListener('click', () => {
            currentFile = a.file;
            label.textContent = a.label;
            render();
            wrap.classList.remove('open');
            onChangeCallback();
          });
          list.appendChild(div);
        });
      }

      const def = activities.find(a => a.file === defaultFile) || activities[0];
      label.textContent = def.label;
      render();

      trigger.addEventListener('click', e => {
        e.stopPropagation();
        wrap.classList.toggle('open');
        if (wrap.classList.contains('open')) {
          const panel = wrap.closest('.quiz-panel');
          const panelRect = panel.getBoundingClientRect();
          const triggerRect = trigger.getBoundingClientRect();
          const available = panelRect.bottom - triggerRect.bottom - 12;
          list.style.maxHeight = Math.min(320, Math.max(100, available)) + 'px';
        }
      });
      list.addEventListener('click', e => e.stopPropagation());

      return { getValue };
    }

    // ── Panel init ──
    function initPanel(suffix, activities, defaultFile) {
      const els = {
        d:        document.getElementById('d-' + suffix),
        rowD:     document.getElementById('row-diff-' + suffix),
        fix:      document.getElementById('fix-' + suffix),
        rowFix:   document.getElementById('row-fixed-' + suffix),
        dim:      document.getElementById('dim-' + suffix),
        rowDim:   document.getElementById('row-dim-' + suffix),
        nivell:   document.getElementById('nivell-' + suffix),
        rowNivell:document.getElementById('row-nivell-' + suffix),
        s:      document.getElementById('s-' + suffix),
        o:      document.getElementById('o-' + suffix),
        i:      document.getElementById('i-' + suffix),
        m:      document.getElementById('m-' + suffix),
        link:   document.getElementById('l-' + suffix),
        copy:   document.getElementById('c-' + suffix),
        open:   document.getElementById('p-' + suffix),
        status: document.getElementById('st-' + suffix)
      };

      let timeout1, timeout2;

      function manageDifficultyRow() {
        if (!els.rowD) return;
        const selected = activities.find(a => a.file === dropdown.getValue());
        els.rowD.style.display = (selected && selected.difficulty) ? '' : 'none';
      }

      function manageFixedRow() {
        if (!els.rowFix) return;
        const selected = activities.find(a => a.file === dropdown.getValue());
        els.rowFix.style.display = (selected && selected.fixed) ? '' : 'none';
        // Quan s'amaga, reseteja el valor per no deixar ?fixed= penjat
        if (!(selected && selected.fixed) && els.fix) els.fix.value = '';
      }

      function manageDimRow() {
        if (!els.rowDim) return;
        els.rowDim.style.display = (dropdown.getValue() === 'vocabulari.html') ? '' : 'none';
      }

      function manageNivellRow() {
        if (!els.rowNivell) return;
        els.rowNivell.style.display = (dropdown.getValue() === 'vocabulari.html') ? '' : 'none';
      }

      function build() {
        const file = dropdown.getValue();
        if (suffix === 'batx') {
          const qs = new URLSearchParams();
          if (els.fix && els.fix.value) qs.set('fixed', els.fix.value);
          const q = qs.toString();
          els.link.textContent = `${BASE_URL}${file}` + (q ? '?' + q : '');
        } else {
          const selected = activities.find(a => a.file === file);
          const qs = new URLSearchParams({
            totalsessions:    els.s.value,
            totaloperations:  els.o.value,
            maxintents:       els.i.value,
            maxenllocmitjana: els.m.value
          });
          if (selected && selected.difficulty && els.d) {
            qs.append('nivell', els.d.value);
          }
          if (els.fix && els.fix.value) {
            qs.set('fixed', els.fix.value);
          }
          if (file === 'vocabulari.html' && els.dim && els.dim.value) {
            qs.append('dim', els.dim.value);
          }
          if (file === 'vocabulari.html' && els.nivell) {
            qs.append('modalitat', els.nivell.value);
          }
          els.link.textContent = `${BASE_URL}${file}?${qs.toString()}`;
        }
      }

      const dropdown = makeCustomDropdown('cd-' + suffix, activities, defaultFile, () => {
        manageDifficultyRow();
        manageFixedRow();
        manageDimRow();
        manageNivellRow();
        build();
      });

      build();
      manageDifficultyRow();
      manageFixedRow();
      manageDimRow();
      manageNivellRow();

      [els.d, els.fix, els.s, els.o, els.i, els.m, els.dim, els.nivell].filter(Boolean).forEach(el => el.addEventListener('change', build));

      els.copy.addEventListener('click', async () => {
        // [FIX BUG5] try-catch + fallback per a HTTP, Safari antic, etc.
        try {
          await navigator.clipboard.writeText(els.link.textContent);
        } catch {
          // Fallback: seleccionar el textarea perquè l'usuari copiï manualment
          const ta = document.querySelector('.link-output');
          if (ta) { ta.select(); document.execCommand('copy'); }
        }
        els.status.textContent = 'Copiat ✅';
        setTimeout(() => els.status.textContent = '', 2000);
      });
      els.open.addEventListener('click', () => window.open(els.link.textContent, '_blank'));
    }

    initPanel('eso',  ACTIVITIES_ESO,  DEFAULT_ESO);
    initPanel('batx', ACTIVITIES_BATX, DEFAULT_BATX);

    // Tanca dropdowns en clicar fora
    document.addEventListener('click', () => {
      document.querySelectorAll('.cd-wrap').forEach(w => w.classList.remove('open'));
    });

    // Navegació mòbil
    document.querySelectorAll('input[name="mobile-nav"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        document.querySelectorAll('.quiz-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(e.target.value).classList.add('active');
      });
    });

    // Obre els desplegables d'activitat per defecte
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.querySelectorAll('.cd-wrap').forEach(wrap => {
          wrap.querySelector('.cd-list').style.maxHeight = '320px';
          wrap.classList.add('open');
        });
      }, 1600);
    });
  </script>
