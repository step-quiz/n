<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Step Quiz">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#f8fafc">

    <meta name="description" content="Activitat interactiva de matemàtiques — Probabilitat">
    <link rel="icon" href="icon.png">
    <title>Probabilitat</title>

    <link rel="stylesheet" href="vendor/katex/katex.min.css">
    <script defer src="vendor/katex/katex.min.js"></script>

    <script>
        window.APP_CONFIG = {
            defaultSessions:      1,
            defaultOperations:    6,
            defaultIntents:       3,
            defaultEnllocMitjana: 1
        };
    </script>

    <!--
        ORDRE DE CÀRREGA
        Capa compartida: utils → config → game-core
        Capa específica de probabilitat:
          math-engine → strings → distractor-lib → question-bank → probabilitat (defer)
    -->
    <script src="js/fixed-sessions.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="vendor/native/native-bridge.js"></script>
<script src="js/game-core.js"></script>
    <script src="js/probabilitat/math-engine.js"></script>
    <script src="js/probabilitat/strings.js"></script>
    <script src="js/probabilitat/distractor-lib.js"></script>
    <script src="js/probabilitat/question-bank.js"></script>
    <script defer src="js/probabilitat/probabilitat.js"></script>

    <link rel="stylesheet" href="css/shared.css?v=1">
    <link rel="stylesheet" href="css/probabilitat.css?v=1">
    <link rel="stylesheet" href="css/chromebook.css">
</head>
<body>

<div class="title-row">
    <a href="index.html" class="home-icon-link" title="Tornar a l'inici" aria-label="Tornar a l'inici">
        <img src="icon.png" alt="Inici">
    </a>
    <h1>Probabilitat</h1>
</div>

<div class="panel" id="main-panel">
    <div id="game-screen" style="display:none;">
        <div class="header-info">
            <div class="header-left">
                <div class="header-meta" id="lvl-display">Pregunta 1 de 6</div>
            </div>
            <div class="score-text" id="score-display">Punts: 0</div>
            <div id="attempts-display" class="attempts-counter">Intents: 3</div>
        </div>

        <div class="prompt-box">
            <div id="prompt-display" class="prompt-text"></div>
        </div>

        <div id="options-container" class="options-grid"></div>
        <div id="missatge-feedback" style="min-height: 40px; margin-top: 15px; text-align: center; font-size: 1.1em; opacity: 0; transition: opacity 0.3s; padding: 0 15px;">
        </div>
    </div>

    <div id="session-summary" style="display:none;"></div>
</div>

</body>
</html>
