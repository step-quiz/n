<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Step Quiz">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#f8fafc">

    <meta name="description" content="Activitat interactiva de matemàtiques — Estadística descriptiva">
    <link rel="icon" href="icon.png">
    <title>Estadística Descriptiva</title>

    <script>
        window.APP_CONFIG = {
            defaultSessions:      1,
            defaultOperations:    2,
            defaultIntents:       4,
            defaultEnllocMitjana: 1
        };
    </script>

    <!--
        ORDRE DE CÀRREGA
        Capa compartida: utils → config → game-core
        Capa específica d'estadística:
          math-engine → strings → question-bank → estadistica (defer)
    -->
    <script src="js/fixed-sessions.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="vendor/native/native-bridge.js"></script>
<script src="js/game-core.js"></script>
    <script src="js/estadistica/math-engine.js"></script>
    <script src="js/estadistica/strings.js"></script>
    <script src="js/estadistica/question-bank.js"></script>
    <script defer src="js/estadistica/estadistica.js"></script>

    <link rel="stylesheet" href="css/shared.css?v=1">
    <link rel="stylesheet" href="css/estadistica.css?v=1">
    <link rel="stylesheet" href="css/chromebook.css">
</head>
<body>

<div class="title-row">
    <a href="index.html" class="home-icon-link" title="Tornar a l'inici" aria-label="Tornar a l'inici">
        <img src="icon.png" alt="Inici">
    </a>
    <h1>Estadística Descriptiva</h1>
</div>

<div class="panel" id="main-panel">
    <div id="game-screen" style="display:none;">
        <div class="header-info">
            <div class="header-left">
                <div class="level-text" id="lvl-display"><span id="session-display">Sessió 1 de 1</span> &nbsp;·&nbsp; Exercici 1 de 2</div>
            </div>
            <div class="step-dots" id="step-dots"></div>
            <div class="score-text" id="score-display">Punts: 0</div>
            <div id="attempts-display" class="attempts-counter" style="display:none;"></div>
        </div>

        <!-- Context i dades brutes -->
        <div class="context-box" id="context-box"></div>
        <div class="data-grid" id="data-grid"></div>

        <!-- Fase actual (títol + hint) -->
        <div class="phase-bar">
            <div class="phase-title" id="phase-title"></div>
            <div class="hint-bar" id="hint-bar"></div>
        </div>

        <!-- Taula de freqüències (dinàmica) + botó OK al costat -->
        <div class="table-check-row">
            <div class="table-wrap" id="table-wrap"></div>
            <div class="check-bar">
                <button class="btn-submit" id="btn-check">OK</button>
            </div>
        </div>

        <!-- Zona d'estadístics (mitjana, mediana, moda) -->
        <div class="stats-wrap" id="stats-wrap" style="display:none;"></div>

        <!-- Feedback -->
        <div id="missatge-feedback" class="feedback-bar" style="opacity:0;"></div>
    </div>
</div>

</body>
</html>
