<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Step Quiz">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#f8fafc">

    <meta name="description" content="Activitat interactiva de matemàtiques — Mitjana aritmètica i ponderada">
    <link rel="icon" href="icon.png">
    <title>Mitjana Aritmètica</title>

    <script>
        window.APP_CONFIG = {
            defaultSessions:      1,
            defaultOperations:    6,
            defaultIntents:       3,
            defaultEnllocMitjana: 1
        };
    </script>

    <!--
        ORDRE DE CÀRREGA
        Capa compartida: utils → config → game-core
        Capa específica: math-engine → strings → question-bank → mitjana (defer)
    -->
    <script src="js/fixed-sessions.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="vendor/native/native-bridge.js"></script>
<script src="js/game-core.js"></script>
    <script src="js/mitjana/math-engine.js"></script>
    <script src="js/mitjana/strings.js"></script>
    <script src="js/mitjana/question-bank.js"></script>
    <script defer src="js/mitjana/mitjana.js"></script>

    <link rel="stylesheet" href="css/shared.css?v=1">
    <link rel="stylesheet" href="css/mitjana.css?v=1">
    <link rel="stylesheet" href="css/chromebook.css">
</head>
<body>

<div class="title-row">
    <a href="index.html" class="home-icon-link" title="Tornar a l'inici" aria-label="Tornar a l'inici">
        <img src="icon.png" alt="Inici">
    </a>
    <h1>Mitjana Aritmètica</h1>
</div>

<div class="panel" id="main-panel">
    <div id="game-screen" style="display:none;">
        <div class="header-info">
            <div class="header-left">
                <div class="session-text" id="session-display">Sessió 1 de 1</div>
                <div class="level-text"   id="lvl-display">Pregunta 1 de 6</div>
            </div>
            <div class="score-text" id="score-display">Punts: 0</div>
            <div id="attempts-display" class="attempts-counter">Intents: 3</div>
        </div>

        <!-- Enunciat -->
        <div class="enunciat-wrap" id="enunciat"></div>

        <!-- Input de resposta -->
        <div class="input-wrap" id="input-zone"></div>

        <!-- Feedback -->
        <div class="feedback-wrap">
            <div id="missatge-feedback" class="feedback-bar" style="opacity:0;"></div>
        </div>

        <!-- Ajuda -->
        <div class="help-bar">
            <button class="btn-help" id="btn-help">💡 Ajuda</button>
        </div>
        <div class="help-panel" id="help-panel">
            <div id="help-content"></div>
        </div>
    </div>
</div>

</body>
</html>
