<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Step Quiz">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#f8fafc">

    <meta name="description" content="Activitat interactiva de matemàtiques — Step Quiz">
    <link rel="icon" href="icon.png">
    <title>Llenguatge Algebraic</title>

    <!--
        PARÀMETRES URL:
          ?totalsessions=N       Nombre de sessions (per defecte: 1)
          ?totaloperations=N     Nombre de preguntes per sessió (per defecte: 10)
          ?maxintents=N          Intents màxims per pregunta (per defecte: 4)
          ?maxenllocmitjana=0|1  Nota: màxim sessió (1) o mitjana (0) (per defecte: 1)

        EXEMPLE:
          llenguatge-algebraic.html?totalsessions=2&totaloperations=8&maxintents=3
    -->

    <!-- Valors per defecte del joc (sobreescrits pels paràmetres URL via config.js) -->
    <script>
        window.APP_CONFIG = {
            defaultSessions:      1,
            defaultOperations:    10,
            defaultIntents:       4,
            defaultEnllocMitjana: 1
        };
    </script>
    <script src="js/fixed-sessions.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>

    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/llenguatge-algebraic.css">

    <!-- KaTeX per renderitzar fraccions en format LaTeX -->
    <link rel="stylesheet" href="vendor/katex/katex.min.css">
    <script defer src="vendor/katex/katex.min.js"></script>
</head>
<body>

<!-- Capçalera amb títol -->
<div class="title-row">
    <a href="index.html" class="home-icon-link" title="Tornar a l'inici" aria-label="Tornar a l'inici">
        <img src="icon.png" alt="Inici">
    </a>
    <h1>Llenguatge Algebraic</h1>
</div>

<!-- Panell principal -->
<div class="panel" id="main-panel">

    <!-- Pantalla de joc -->
    <div id="game-screen" style="display:none;">

        <!-- Capçalera del joc -->
        <div class="header-info">
            <div class="header-left">
                <div class="session-text" id="session-display">Sessió 1 de 1</div>
                <div class="level-text"   id="lvl-display">Pregunta 1 de 10</div>
            </div>
            <div class="score-text" id="score-display">Punts: 0</div>
            <div id="attempts-display" class="attempts-counter">Intents: 4</div>
        </div>

        <!-- Pregunta -->
        <div class="question-box" id="question-box">
            <div class="question-context" id="question-context"></div>
            <div class="question-text" id="question-text"></div>
        </div>

        <!-- Opcions multi-resposta -->
        <div class="options-panel" id="options-panel">
            <div class="options-grid" id="options-grid"></div>
        </div>

        <!-- #mini-victory-overlay injectat aquí per game-core.js via injectSharedHTML() -->

    </div>

    <!-- #session-end-screen i #final-screen injectats per game-core.js via injectSharedHTML() -->

</div>

<!--
    ORDRE DE CÀRREGA:
    utils → config → game-core → question-bank → llenguatge-algebraic (defer)
-->
<script src="vendor/native/native-bridge.js"></script>
<script src="js/game-core.js"></script>
<script src="js/llenguatge-algebraic/question-bank.js"></script>
<script defer src="js/llenguatge-algebraic/llenguatge-algebraic.js"></script>

</body>
</html>
