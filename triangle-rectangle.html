<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Step Quiz">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#f8fafc">

    <meta name="description" content="Activitat interactiva de matemàtiques — Teorema de Pitàgores">
    <link rel="icon" href="icon.png">
    <title>Triangle Rectangle — Teorema de Pitàgores</title>

    <script>
        window.APP_CONFIG = {
            defaultSessions:      3,
            defaultOperations:    8,
            defaultIntents:       4,
            defaultEnllocMitjana: 1
        };
    </script>
    <script src="js/fixed-sessions.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/triangle-rectangle.css">
    <link rel="stylesheet" href="css/chromebook.css">
</head>
<body>

<div class="title-row">
    <a href="index.html" class="home-icon-link" title="Tornar a l'inici" aria-label="Tornar a l'inici">
        <img src="icon.png" alt="Inici">
    </a>
    <h1>Triangle Rectangle</h1>
</div>

<div class="panel" id="main-panel">
    <div id="game-screen" style="display:none;">

        <div class="header-info">
            <div class="header-left">
                <div class="session-text" id="session-display">Sessió 1 de 3</div>
                <div class="level-text"   id="lvl-display">Problema 1 de 8</div>
            </div>
            <div class="score-text"       id="score-display">Punts: 0</div>
            <div class="attempts-counter" id="attempts-display">Intents: 4</div>
        </div>

        <!-- Zona del problema: triangle rectangle SVG -->
        <div class="problem-box" id="problem-box">
            <div class="formula-strip" id="formula-strip">
                hipotenusa² = catet² + catet²
            </div>
            <svg id="triangle-svg"
                 viewBox="0 0 240 195"
                 xmlns="http://www.w3.org/2000/svg"
                 aria-label="Triangle rectangle del problema" role="img">
            </svg>
        </div>

        <!-- Panell de resolució -->
        <div class="resolution-panel" id="resolution-panel">
            <div class="step-instruction" id="step-instruction" aria-live="polite"></div>

            <button class="btn-help" id="btn-help" onclick="toggleHelp()">
                💡 Ajuda
            </button>

            <div class="help-panel" id="help-panel" aria-live="polite"></div>

            <div class="step-container active" id="step-value">
                <div class="value-buttons" id="value-buttons"
                     role="group" aria-label="Tria el valor">
                    <!-- Omplert dinàmicament -->
                </div>
            </div>
        </div>

    </div><!-- /game-screen -->
</div><!-- /panel -->

<script src="vendor/native/native-bridge.js"></script>
<script src="js/game-core.js"></script>
<script src="js/triangle-rectangle/triangle-rectangle.js"></script>
<script>
    initGame();
</script>
</body>
</html>
